# Render Blueprint for the ESM lofi audio relay (SoundCloud edition).
# This repo IS the relay (files live at the root), so no rootDir is needed:
# New -> Blueprint in the Render dashboard, pick this repo + branch -> Apply.
#
# Built from ./Dockerfile (runtime: docker): ffmpeg + yt-dlp stream Lofi Girl's
# SoundCloud catalogue on a loop. SoundCloud resolves fine from a datacenter IP,
# so there are no cookies / tokens / secrets to manage.
#
# Free plan suits a screen that's only on during the day: it spins down when no
# TV is connected (nothing billed overnight) and cold-starts in ~30-60s on the
# first morning connection. No healthCheckPath on purpose, so Render lets it idle.
services:
  - type: web
    name: esm-lofi-relay
    runtime: docker
    plan: free
    region: frankfurt
    envVars:
      - key: STREAM_URL
        value: https://soundcloud.com/lofi_girl
